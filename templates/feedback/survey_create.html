{% extends "feedback/dashboard_base.html" %}

{% block title %}建立問卷{% endblock %}

{% block dashboard_content %}
<section class="section-header">
    <div>
        <h1>建立問卷</h1>
        <p>先設定表單標題、模式與基本配置，再進入題目編排</p>
    </div>
</section>

<section class="google-form-shell">
    <form method="post" class="google-meta-card">
        {% csrf_token %}
        <div class="form-title-band"></div>
        {% for field in form %}
            <div class="field-block">
                {{ field.label_tag }}
                {{ field }}
                {{ field.errors }}
            </div>
        {% endfor %}
        <button type="submit" class="primary-action wide">建立並開始編輯</button>
    </form>
</section>
{% endblock %}
