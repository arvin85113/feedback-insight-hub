{% extends "base.html" %}

{% block title %}送出成功 | FeedBack IQ{% endblock %}

{% block content %}
<section class="success-panel">
    <p class="section-kicker">Submitted</p>
    <h1>回饋已成功送出</h1>
    <p>感謝你的意見。我們會將回覆納入後續分析，若你已同意接收通知，之後也會收到改善更新。</p>
    <div class="hero-actions">
        <a class="button button-primary" href="{% url 'feedback:home' %}">返回首頁</a>
        {% if user.is_authenticated and not user.is_manager %}
            <a class="button button-ghost" href="{% url 'feedback:customer-home' %}">前往顧客中心</a>
        {% endif %}
    </div>
</section>
{% endblock %}
