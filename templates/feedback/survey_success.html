{% extends "base.html" %}

{% block title %}提交成功 | FeedBack IQ{% endblock %}

{% block content %}
<section class="success-panel">
    <p class="section-kicker">Submitted</p>
    <h1>你的回饋已成功送出</h1>
    <p>
        感謝你花時間提供意見。系統會將內容納入分析、統計與改善追蹤流程；
        若你有開啟通知偏好，後續若有相關改善進度，也會同步通知你。
    </p>
    <div class="hero-actions">
        <a class="button button-primary" href="{% url 'feedback:home' %}">回首頁</a>
        {% if user.is_authenticated and not user.is_manager %}
            <a class="button button-ghost" href="{% url 'feedback:customer-home' %}">前往顧客中心</a>
        {% endif %}
    </div>
</section>
{% endblock %}
