{% extends "base.html" %}

{% block title %}註冊{% endblock %}

{% block content %}
<section class="panel auth-panel">
    <h1>建立客戶帳號</h1>
    <p>正式問卷可綁定登入資料，方便後續個別通知與追蹤。</p>
    <form method="post" class="survey-form">
        {% csrf_token %}
        {% for field in form %}
            <div class="field-block">
                {{ field.label_tag }}
                {{ field }}
                {{ field.errors }}
            </div>
        {% endfor %}
        <button type="submit" class="button">註冊</button>
    </form>
</section>
{% endblock %}
